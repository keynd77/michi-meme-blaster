<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Michi Meme Blaster</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 320px;
            height: 520px;
            overflow-y: auto;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #121212;
            color: #e7e9ea;
        }

        .header {
            padding: 16px 16px 12px;
            text-align: center;
            border-bottom: 1px solid #2f3336;
        }

        .header h1 {
            font-size: 18px;
            font-weight: 800;
            color: #FAECCF;
            margin-bottom: 2px;
        }

        .header p {
            font-size: 11px;
            color: #71767b;
        }

        .stats-section {
            padding: 16px;
        }

        .big-number {
            text-align: center;
            margin-bottom: 14px;
        }

        .big-number .count {
            font-size: 48px;
            font-weight: 800;
            color: #FAECCF;
            line-height: 1;
        }

        .big-number .label {
            font-size: 13px;
            color: #71767b;
            margin-top: 2px;
        }

        .stats-row {
            display: flex;
            justify-content: space-around;
            margin-bottom: 14px;
            text-align: center;
        }

        .stats-row .stat-value {
            font-size: 22px;
            font-weight: 700;
        }

        .stats-row .stat-label {
            font-size: 11px;
            color: #71767b;
        }

        .progress-section {
            margin-bottom: 14px;
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #71767b;
            margin-bottom: 4px;
        }

        .progress-bar {
            background: #2f3336;
            border-radius: 4px;
            height: 6px;
            overflow: hidden;
        }

        .progress-fill {
            background: #FAECCF;
            height: 100%;
            border-radius: 4px;
            transition: width 0.3s;
        }

        .badge-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 8px;
        }

        .badge {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            cursor: pointer;
            position: relative;
            transition: transform 0.15s, box-shadow 0.15s;
        }

        .badge:hover {
            transform: scale(1.15);
        }

        .badge.selected {
            box-shadow: 0 0 0 2px #FAECCF;
        }

        .badge.earned {
            background: #FFD700;
            color: #1a1a1a;
        }

        .badge.unearned {
            background: #2f3336;
            color: #555;
        }

        .badge-detail {
            background: #1e1e1e;
            border: 1px solid #2f3336;
            border-radius: 8px;
            padding: 10px 12px;
            margin-top: 8px;
            display: none;
            animation: fadeIn 0.15s ease;
        }

        .badge-detail.visible {
            display: block;
        }

        .badge-detail .badge-detail-name {
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 2px;
        }

        .badge-detail .badge-detail-desc {
            font-size: 12px;
            color: #71767b;
        }

        .badge-detail .badge-detail-status {
            font-size: 11px;
            margin-top: 4px;
            font-weight: 600;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .links-section {
            padding: 12px 16px;
            border-top: 1px solid #2f3336;
            font-size: 12px;
        }

        .links-section a {
            color: #FAECCF;
            text-decoration: none;
        }

        .links-section a:hover {
            text-decoration: underline;
        }

        .ca-row {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 6px;
            color: #71767b;
            font-size: 11px;
            cursor: pointer;
        }

        .ca-row:hover {
            color: #FAECCF;
        }

        .ca-row .copied {
            color: #FFD700;
            font-size: 10px;
        }

        .settings-section {
            padding: 12px 16px 16px;
            border-top: 1px solid #2f3336;
        }

        .animated-pics-preview {
            margin-top: 8px;
            padding: 10px;
            background: rgba(255,255,255,0.04);
            border-radius: 8px;
            display: none;
        }

        .animated-pics-preview.visible {
            display: block;
        }

        .animated-pics-images {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        .animated-pics-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #2f3336;
        }

        .animated-pics-header {
            flex: 1;
            height: 28px;
            object-fit: cover;
            border-radius: 4px;
            border: 2px solid #2f3336;
        }

        .animated-pics-placeholder {
            font-size: 11px;
            color: #71767b;
            margin-bottom: 6px;
        }

        .animated-pics-link {
            display: inline-block;
            font-size: 11px;
            color: #FAECCF;
            text-decoration: none;
        }

        .animated-pics-link:hover {
            text-decoration: underline;
        }

        .settings-section h3 {
            font-size: 13px;
            font-weight: 700;
            color: #71767b;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .setting-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 0;
        }

        .setting-row label {
            font-size: 13px;
            cursor: pointer;
        }

        .setting-row input[type="text"] {
            width: 140px;
            padding: 4px 8px;
            background: #2f3336;
            border: 1px solid #444;
            border-radius: 6px;
            color: #e7e9ea;
            font-size: 12px;
            outline: none;
        }

        .setting-row input[type="text"]:focus {
            border-color: #FAECCF;
        }

        /* Toggle switch */
        .toggle {
            position: relative;
            width: 36px;
            height: 20px;
            -webkit-appearance: none;
            appearance: none;
            background: #2f3336;
            border-radius: 10px;
            outline: none;
            cursor: pointer;
            transition: background 0.2s;
        }

        .toggle:checked {
            background: #FAECCF;
        }

        .toggle::before {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 16px;
            height: 16px;
            background: #fff;
            border-radius: 50%;
            transition: transform 0.2s;
        }

        .toggle:checked::before {
            transform: translateX(16px);
            background: #1a1a1a;
        }
    </style>
</head>

<body>
    <div class="header">
        <h1>Michi Meme Blaster</h1>
        <p>bullpost $michi fast and easy</p>
    </div>

    <!-- Not on X notice -->
    <div id="notOnXNotice" style="display:none;padding:16px;text-align:center;color:#aaa;font-size:12px;border-bottom:1px solid rgba(255,255,255,0.1);">
        Open X / Twitter to see your personal stats
    </div>

    <div class="stats-section">
        <div class="big-number">
            <div class="count" id="totalCount">-</div>
            <div class="label" id="totalLabel">memes posted</div>
        </div>

        <div class="stats-row">
            <div>
                <div class="stat-value" id="todayCount">-</div>
                <div class="stat-label">Today</div>
            </div>
            <div>
                <div class="stat-value" id="currentStreak">-</div>
                <div class="stat-label">Streak</div>
            </div>
            <div>
                <div class="stat-value" id="longestStreak">-</div>
                <div class="stat-label">Best</div>
            </div>
        </div>

        <div style="padding:6px 16px;display:flex;flex-direction:column;gap:5px;align-items:center;">
          <div style="display:flex;gap:8px;font-size:11px;color:#aaa;">
            <label style="cursor:pointer;display:flex;align-items:center;gap:3px;">
              <input type="radio" name="shareMode" value="all" checked style="accent-color:#f7b731;"> All
            </label>
            <label style="cursor:pointer;display:flex;align-items:center;gap:3px;">
              <input type="radio" name="shareMode" value="today" style="accent-color:#f7b731;"> Today
            </label>
            <label style="cursor:pointer;display:flex;align-items:center;gap:3px;">
              <input type="radio" name="shareMode" value="total" style="accent-color:#f7b731;"> Total
            </label>
            <span style="color:rgba(255,255,255,0.15);">|</span>
            <label style="cursor:pointer;display:flex;align-items:center;gap:3px;">
              <input type="radio" name="shareTemplate" value="lesson" checked style="accent-color:#f7b731;"> Whiteboard
            </label>
            <label style="cursor:pointer;display:flex;align-items:center;gap:3px;">
              <input type="radio" name="shareTemplate" value="sign" style="accent-color:#f7b731;"> Sign
            </label>
          </div>
          <div style="display:flex;gap:6px;">
            <button id="shareTgBtn" style="background:linear-gradient(135deg,#0088cc,#00a0e3);color:#fff;border:none;border-radius:16px;padding:4px 12px;cursor:pointer;font-size:11px;">Share in TG</button>
            <button id="refreshBtn" style="background:rgba(255,255,255,0.1);color:#aaa;border:none;border-radius:16px;padding:4px 10px;cursor:pointer;font-size:11px;">Refresh</button>
          </div>
        </div>

        <div class="progress-section" id="progressSection">
            <div class="progress-info">
                <span id="progressText">0/1</span>
                <span id="progressBadge">First Meme</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width: 0%"></div>
            </div>
        </div>

        <div class="badge-grid" id="badgeGrid"></div>
        <div class="badge-detail" id="badgeDetail">
            <div class="badge-detail-name" id="badgeDetailName"></div>
            <div class="badge-detail-desc" id="badgeDetailDesc"></div>
            <div class="badge-detail-status" id="badgeDetailStatus"></div>
        </div>
    </div>

    <!-- Daily Challenge -->
    <div id="challengeSection" style="padding:10px 16px;border-bottom:1px solid rgba(255,255,255,0.1);display:none;">
      <div style="font-size:11px;color:#aaa;margin-bottom:4px;">DAILY CHALLENGE</div>
      <div id="challengeTitle" style="font-size:13px;font-weight:600;color:#f7b731;"></div>
      <div id="challengeDesc" style="font-size:11px;color:#ccc;margin-top:2px;"></div>
      <div id="challengeProgress" style="margin-top:4px;height:4px;background:rgba(255,255,255,0.1);border-radius:2px;overflow:hidden;">
        <div id="challengeBar" style="height:100%;background:#f7b731;width:0%;transition:width 0.3s;"></div>
      </div>
    </div>

    <!-- Leaderboard -->
    <div id="leaderboardSection" style="padding:10px 16px;border-bottom:1px solid rgba(255,255,255,0.1);">
      <div style="font-size:11px;color:#aaa;margin-bottom:4px;">TOP BLASTERS THIS WEEK</div>
      <div id="leaderboardList" style="font-size:12px;color:#ccc;"></div>
    </div>

    <div class="links-section">
        <a href="https://michi.meme" target="_blank">michi.meme</a>
        <div class="ca-row" id="caRow">
            <span>CA:</span>
            <span style="font-family: monospace; font-size: 10px;">AywAYdNJ...Qpump</span>
            <span class="copied" id="copiedLabel" style="display: none;">copied!</span>
        </div>
    </div>

    <div class="settings-section">
        <h3>Settings</h3>
        <div class="setting-row">
            <label for="toggleMichiMode">Michi Mode</label>
            <input type="checkbox" id="toggleMichiMode" class="toggle">
        </div>
        <div class="setting-row">
            <label for="toggleSound">Sound</label>
            <input type="checkbox" id="toggleSound" class="toggle">
        </div>
        <div class="setting-row">
            <label for="toggleQuickFireBtn">Show Quick Fire Button</label>
            <input type="checkbox" id="toggleQuickFireBtn" class="toggle">
        </div>
        <div class="setting-row">
            <label for="toggleQuickFireAuto">Quick Fire: Auto-post</label>
            <input type="checkbox" id="toggleQuickFireAuto" class="toggle">
        </div>
        <div class="setting-row">
            <label for="quickFireTextInput">Quick Fire Text</label>
            <input type="text" id="quickFireTextInput" value="gmichi">
        </div>
        <div class="setting-row">
            <label for="toggleSidebarStats">Show Sidebar Stats</label>
            <input type="checkbox" id="toggleSidebarStats" class="toggle">
        </div>
        <div class="setting-row">
            <label for="toggleAnimatedPics">Animated Profile Pics</label>
            <input type="checkbox" id="toggleAnimatedPics" class="toggle">
        </div>
        <div class="animated-pics-preview" id="animatedPicsPreview">
            <div class="animated-pics-images" id="animatedPicsImages" style="display:none;">
                <img id="animatedPicsAvatar" class="animated-pics-avatar" alt="Your avatar GIF">
                <img id="animatedPicsHeader" class="animated-pics-header" alt="Your header image">
            </div>
            <p class="animated-pics-placeholder" id="animatedPicsPlaceholder" style="display:none;"></p>
            <a href="https://michi.meme/dashboard" target="_blank" class="animated-pics-link">⚙ Set your GIF at michi.meme/dashboard</a>
        </div>
    </div>

    <script src="utils.js"></script>
    <script src="popup.js"></script>
</body>

</html>
